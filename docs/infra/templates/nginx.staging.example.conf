# Ejemplo de configuración Nginx para RIPNEL staging (same-origin)
#
# Uso:
#   1. Copiar este archivo a /etc/nginx/sites-available/ripnel-staging.conf
#      en el Droplet (nunca en este repo con valores reales).
#   2. Reemplazar <STAGING_DOMAIN> por el dominio real de staging.
#   3. Emitir certificado TLS (por ejemplo con certbot) y completar las
#      rutas de certificado que certbot genera automáticamente — no se
#      incluyen aquí rutas de certificados reales ni ficticias.
#   4. Habilitar: ln -s /etc/nginx/sites-available/ripnel-staging.conf
#      /etc/nginx/sites-enabled/ && nginx -t && systemctl reload nginx.
#
# Topología (same-origin, ver docs/working/reports/INFRA-04-B-staging-runbook.md):
#   /health, /api/*  -> backend Express  (127.0.0.1:3001)
#   /  (resto)       -> frontend Next.js (127.0.0.1:3000)

server {
    listen 80;
    listen [::]:80;
    server_name <STAGING_DOMAIN>;

    # certbot suele reescribir este bloque para redirigir a HTTPS y
    # agregar el server block 443 con las rutas reales de certificado.
    # No se incluye aquí para no versionar rutas de certificado ficticias.

    location /health {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
